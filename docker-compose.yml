version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - todo-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - todo-net
    ports:
      - "127.0.0.1:${BACKEND_PORT}:${BACKEND_PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - todo-net
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  mongo_data:
    driver: local

networks:
  todo-net:
    driver: bridge